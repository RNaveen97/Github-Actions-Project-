# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: CICD pipeline

on:
  push:
    branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]

jobs:
  compile:
 
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # On the runner it will create a local copy of the repository i.e it checkout the code
    - name: Set up JDK 17
      uses: actions/setup-java@v4  # setup environment to installing jdk
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn compile 

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    # - name: Update dependency graph
    #   uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

  security-check:
    runs-on: ubuntu-latest
    needs: compile
    steps:
    - uses: actions/checkout@v4 # On the runner it will create a local copy of the repository i.e it checkout the code
    - name: Trivy installation
      run: |
        sudo apt-get install wget gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -y
        sudo apt-get install trivy -y  
    - name: Trivy FS scan
      run: trivy fs --format table -o fs-report.json .

    - name: Gitleaks Installation  # If there any senstive informations like API keys,secret key,access key are hardcoded, gitleaks tell not to do that 
      run: sudo apt install gitleaks -y

    - name: Gitleaks code Scanner  # actual scan by gitleaks
      run: gitleaks detect source . -r gitleaks-report.json -f json  # it for the report(r) as a seperate file with format(f)
